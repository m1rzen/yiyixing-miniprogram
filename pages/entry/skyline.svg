<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" fill="none">
  <defs>
    <!-- 碉楼主体渐变 -->
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A88D"/>
      <stop offset="100%" stop-color="#B8956F"/>
    </linearGradient>
    <!-- 远景建筑渐变（更淡） -->
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DCC8B4"/>
      <stop offset="100%" stop-color="#D4B8A0"/>
    </linearGradient>
    <!-- 最远景（最淡） -->
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D8C8"/>
      <stop offset="100%" stop-color="#E0CCB8"/>
    </linearGradient>
    <!-- 树木渐变 -->
    <linearGradient id="tree" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8A48C"/>
      <stop offset="100%" stop-color="#A08E74"/>
    </linearGradient>
  </defs>

  <!-- ======== 最远景建筑（第三层） ======== -->
  <!-- 远景碉楼左 -->
  <rect x="120" y="200" width="48" height="180" rx="3" fill="url(#g3)" opacity="0.5"/>
  <rect x="114" y="190" width="60" height="14" rx="3" fill="#E0CCB8" opacity="0.5"/>
  <rect x="118" y="176" width="52" height="18" rx="2" fill="#E8D8C8" opacity="0.45"/>
  <!-- 远景碉楼右 -->
  <rect x="580" y="220" width="44" height="160" rx="3" fill="url(#g3)" opacity="0.5"/>
  <rect x="575" y="210" width="54" height="14" rx="3" fill="#E0CCB8" opacity="0.5"/>
  <rect x="579" y="196" width="46" height="18" rx="2" fill="#E8D8C8" opacity="0.45"/>

  <!-- ======== 中景建筑（第二层） ======== -->
  <!-- 中景碉楼左 -->
  <rect x="200" y="170" width="60" height="210" rx="3" fill="url(#g2)" opacity="0.7"/>
  <rect x="193" y="158" width="74" height="16" rx="3" fill="#D4B8A0" opacity="0.7"/>
  <rect x="198" y="142" width="64" height="20" rx="3" fill="#DCC8B4" opacity="0.65"/>
  <!-- 窗户 -->
  <rect x="212" y="185" width="12" height="18" rx="2" fill="#F0E4D6" opacity="0.6"/>
  <rect x="236" y="185" width="12" height="18" rx="2" fill="#F0E4D6" opacity="0.6"/>
  <rect x="212" y="220" width="12" height="18" rx="2" fill="#F0E4D6" opacity="0.6"/>
  <rect x="236" y="220" width="12" height="18" rx="2" fill="#F0E4D6" opacity="0.6"/>
  <rect x="212" y="255" width="12" height="18" rx="2" fill="#F0E4D6" opacity="0.6"/>
  <rect x="236" y="255" width="12" height="18" rx="2" fill="#F0E4D6" opacity="0.6"/>

  <!-- 中景碉楼右 -->
  <rect x="490" y="190" width="56" height="190" rx="3" fill="url(#g2)" opacity="0.7"/>
  <rect x="484" y="178" width="68" height="16" rx="3" fill="#D4B8A0" opacity="0.7"/>
  <rect x="488" y="162" width="60" height="20" rx="3" fill="#DCC8B4" opacity="0.65"/>
  <!-- 窗户 -->
  <rect x="502" y="205" width="11" height="16" rx="2" fill="#F0E4D6" opacity="0.6"/>
  <rect x="523" y="205" width="11" height="16" rx="2" fill="#F0E4D6" opacity="0.6"/>
  <rect x="502" y="238" width="11" height="16" rx="2" fill="#F0E4D6" opacity="0.6"/>
  <rect x="523" y="238" width="11" height="16" rx="2" fill="#F0E4D6" opacity="0.6"/>

  <!-- ======== 主碉楼（前景，最高最大） ======== -->
  <!-- 主体 -->
  <rect x="320" y="110" width="110" height="270" rx="4" fill="url(#g1)"/>
  <!-- 顶部檐口（三层叠退，开平碉楼特色） -->
  <rect x="310" y="95" width="130" height="20" rx="4" fill="#B8956F"/>
  <rect x="316" y="78" width="118" height="22" rx="3" fill="#C9A88D"/>
  <rect x="325" y="62" width="100" height="20" rx="3" fill="#B8956F"/>
  <!-- 最顶部小亭 -->
  <rect x="350" y="42" width="50" height="24" rx="3" fill="#C9A88D"/>
  <rect x="345" y="36" width="60" height="10" rx="3" fill="#B8956F"/>
  <!-- 窗户（三列四行） -->
  <rect x="338" y="130" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <rect x="367" y="130" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <rect x="396" y="130" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <rect x="338" y="172" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <rect x="367" y="172" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <rect x="396" y="172" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <rect x="338" y="214" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <rect x="367" y="214" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <rect x="396" y="214" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <rect x="338" y="256" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <rect x="367" y="256" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <rect x="396" y="256" width="16" height="22" rx="3" fill="#F0E4D6" opacity="0.8"/>
  <!-- 大门 -->
  <rect x="358" y="330" width="34" height="50" rx="17 17 0 0" fill="#A08060" opacity="0.7"/>

  <!-- ======== 低矮民居 ======== -->
  <!-- 左侧民居群 -->
  <rect x="155" y="320" width="80" height="60" rx="3" fill="#D4B8A0" opacity="0.6"/>
  <polygon points="155,320 195,290 235,320" fill="#C9A88D" opacity="0.55"/>
  <rect x="250" y="310" width="65" height="70" rx="3" fill="#DCC8B4" opacity="0.55"/>
  <polygon points="250,310 282,285 315,310" fill="#D4B8A0" opacity="0.5"/>

  <!-- 右侧民居群 -->
  <rect x="435" y="318" width="70" height="62" rx="3" fill="#D4B8A0" opacity="0.6"/>
  <polygon points="435,318 470,292 505,318" fill="#C9A88D" opacity="0.55"/>
  <rect x="555" y="325" width="75" height="55" rx="3" fill="#DCC8B4" opacity="0.55"/>
  <polygon points="555,325 592,298 630,325" fill="#D4B8A0" opacity="0.5"/>

  <!-- ======== 树木装饰 ======== -->
  <!-- 椭圆树冠 -->
  <ellipse cx="85" cy="335" rx="30" ry="45" fill="url(#tree)" opacity="0.4"/>
  <rect x="82" y="365" width="6" height="20" fill="#A08E74" opacity="0.35"/>
  
  <ellipse cx="665" cy="340" rx="28" ry="40" fill="url(#tree)" opacity="0.35"/>
  <rect x="662" y="368" width="6" height="18" fill="#A08E74" opacity="0.3"/>

  <ellipse cx="290" cy="345" rx="22" ry="32" fill="url(#tree)" opacity="0.3"/>
  <rect x="288" y="370" width="5" height="14" fill="#A08E74" opacity="0.25"/>

  <ellipse cx="460" cy="348" rx="20" ry="30" fill="url(#tree)" opacity="0.3"/>
  <rect x="458" y="372" width="5" height="14" fill="#A08E74" opacity="0.25"/>

  <!-- ======== 地面线 ======== -->
  <rect x="0" y="380" width="750" height="120" rx="0" fill="#E8D8C8" opacity="0.25"/>
  <ellipse cx="375" cy="385" rx="340" ry="12" fill="#D4C4B0" opacity="0.2"/>

  <!-- ======== 云彩装饰 ======== -->
  <ellipse cx="130" cy="80" rx="50" ry="16" fill="#E8DDD4" opacity="0.4"/>
  <ellipse cx="110" cy="76" rx="30" ry="12" fill="#E8DDD4" opacity="0.35"/>
  
  <ellipse cx="620" cy="100" rx="45" ry="14" fill="#E8DDD4" opacity="0.35"/>
  <ellipse cx="640" cy="96" rx="28" ry="10" fill="#E8DDD4" opacity="0.3"/>

  <!-- ======== 品牌文字 ======== -->
  <text x="375" y="440" text-anchor="middle" font-size="22" fill="#B8956F" font-weight="600" letter-spacing="6" opacity="0.6" font-family="Georgia, serif">邑 · Yi</text>
</svg>